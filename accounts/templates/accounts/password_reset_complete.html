{% extends 'base.html' %}

{% block title %}Пароль изменён{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-card-centered">
        <div class="auth-icon auth-icon-success">✅</div>

        <div class="auth-header">
            <h1 class="auth-title">Пароль изменён!</h1>
            <p class="auth-subtitle">Теперь можно войти с новым паролем</p>
        </div>

        <div class="auth-actions">
            <a href="{% url 'login' %}" class="btn btn-primary btn-large">
                Войти в аккаунт
            </a>
        </div>
    </div>
</div>
{% endblock %}
